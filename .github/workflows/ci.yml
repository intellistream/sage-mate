name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install via quickstart.sh
        run: ./quickstart.sh --no-systemd --no-siblings --yes
      - name: Install dev extras (ruff)
        run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check src/ tests/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install via quickstart.sh
        run: ./quickstart.sh --no-systemd --no-siblings --yes
      - name: Install dev extras (pytest)
        run: pip install -e '.[dev]'
      - name: Validate frontend script syntax
        run: node --check src/sage_faculty_twin/web/app.js
      - name: Frontend contract test
        run: python -m pytest tests/test_frontend_contract.py -q

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OS test dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install via quickstart.sh
        run: ./quickstart.sh --no-systemd --no-siblings --yes
      - name: Install dev extras (pytest, pytest-asyncio)
        run: pip install -e '.[dev]'
      - name: Run test suite
        env:
          PYTHONPATH: src
          DIGITAL_TWIN_NEUROMEM_INDEX_TYPE: segment
          DIGITAL_TWIN_CONVERSATION_MEMORY_INDEX_TYPE: segment
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_sagevdb_knowledge_store.py \
            --ignore=tests/test_identity_eval.py

  install-linux-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OS test dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify one-command Linux CPU install path
        env:
          FACULTY_TWIN_PARENT_DIR: ${{ runner.temp }}/sage-cpu-parent
          DIGITAL_TWIN_RUNTIME_DIR: ${{ runner.temp }}/sage-cpu-parent/sage-mate-runtime-private
          FACULTY_TWIN_VENV: ${{ runner.temp }}/sage-cpu-venv
          PIP_INSTALL_TIMEOUT_SECONDS: "300"
        run: |
          ./quickstart.sh \
            --target hosted-web \
            --no-systemd \
            --no-siblings \
            --skip-vdb-extras \
            --yes
          test -f "$FACULTY_TWIN_PARENT_DIR/sage-mate-runtime-private/data/workflow_policies/faculty-default-2026-05.json"
          test -f "$FACULTY_TWIN_PARENT_DIR/sage-mate-runtime-private/data/workflow_scenarios/v3_preview_scenarios.json"
          test -f "$FACULTY_TWIN_PARENT_DIR/sage-mate-runtime-private/data/capability_plugins/course_advising.json"

  install-linux-ascend:
    runs-on: [self-hosted, linux, server, ascend]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize Ascend launcher submodules
        run: git submodule update --init deps/vllm-hust-dev-hub deps/vllm-hust deps/vllm-ascend-hust deps/ascend-runtime-manager
      - name: Verify one-command Linux Ascend install path
        env:
          FACULTY_TWIN_PARENT_DIR: ${{ runner.temp }}/sage-ascend-parent
          DIGITAL_TWIN_RUNTIME_DIR: ${{ runner.temp }}/sage-ascend-parent/sage-mate-runtime-private
          FACULTY_TWIN_VENV: ${{ runner.temp }}/sage-ascend-venv
          PIP_INSTALL_TIMEOUT_SECONDS: "300"
        run: |
          ./quickstart.sh \
            --target hosted-web \
            --with-vllm-engine \
            --with-vllm-proxy \
            --no-systemd \
            --no-siblings \
            --skip-vdb-extras \
            --yes
          test -f "$FACULTY_TWIN_PARENT_DIR/sage-mate-runtime-private/data/workflow_policies/faculty-default-2026-05.json"
          grep -q '^DIGITAL_TWIN_DEPLOYMENT_MODE=hosted$' .env
          grep -q '^VLLM_PROXY_UPSTREAM_BASE_URL=http://127.0.0.1:8000/v1$' .env
