name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  frontend-and-api-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Validate frontend script syntax
        run: node --check src/sage_faculty_twin/web/app.js

      - name: Run frontend and suggestion smoke tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/test_web_shell.py tests/test_suggestion_board.py -q