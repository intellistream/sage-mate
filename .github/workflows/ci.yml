name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install via quickstart.sh
        run: ./quickstart.sh --no-systemd --yes
      - name: Install dev extras (ruff)
        run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check src/ tests/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install via quickstart.sh
        run: ./quickstart.sh --no-systemd --yes
      - name: Install dev extras (pytest)
        run: pip install -e '.[dev]'
      - name: Validate frontend script syntax
        run: node --check src/sage_faculty_twin/web/app.js
      - name: Frontend contract test
        run: python -m pytest tests/test_frontend_contract.py -q

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install via quickstart.sh
        run: ./quickstart.sh --no-systemd --yes
      - name: Install dev extras (pytest, pytest-asyncio)
        run: pip install -e '.[dev]'
      - name: Run test suite
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_sagevdb_knowledge_store.py \
            --ignore=tests/test_identity_eval.py
