worker_processes  1;
pid nginx.pid;
error_log logs/error.log;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Allow chat attachments up to slightly above the application's 5MB hard
    # limit (`MAX_CHAT_ATTACHMENT_BYTES`). The default 1MB caused production
    # uploads of multi-page PDFs to fail with HTTP 413 at the proxy layer
    # before reaching FastAPI. Keep this in sync with
    # `src/sage_faculty_twin/api.py::MAX_CHAT_ATTACHMENT_BYTES` and the
    # frontend `MAX_CHAT_UPLOAD_BYTES`.
    client_max_body_size 8m;
    client_body_timeout 120s;

    # Long LLM answers can take 30-60 seconds; raise the proxy read timeout
    # so we don't truncate streaming responses ahead of the upstream LLM.
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_connect_timeout 30s;
    proxy_buffering off;

    access_log logs/access.log;

    server {
        listen       __SITE_PORT__;
        server_name  localhost;

        location = / {
            return 302 /home/;
        }

        location = /home {
            return 302 /home/;
        }

        location /home/ {
            proxy_pass http://127.0.0.1:__APP_PORT__/home/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            proxy_pass http://127.0.0.1:__APP_PORT__;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}