worker_processes  1;
pid nginx.pid;
error_log logs/error.log;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    proxy_cache_path cache/home_proxy levels=1:2 keys_zone=home_proxy_cache:10m max_size=256m inactive=60m use_temp_path=off;
    map $request_uri $homepage_request_uri {
        ~^/home(?<suffix>/.*)$ $suffix;
        default $request_uri;
    }

    access_log logs/access.log;

    server {
        listen       __SITE_PORT__;
        server_name  localhost;

        location = /home {
            return 301 /home/;
        }

        location /home/ {
            set $homepage_upstream __HOMEPAGE_UPSTREAM_HOST__;
            proxy_pass __HOMEPAGE_UPSTREAM_SCHEME__://$homepage_upstream$homepage_request_uri;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_name $homepage_upstream;
            proxy_cache home_proxy_cache;
            proxy_cache_key "$scheme$proxy_host$request_uri";
            proxy_cache_lock on;
            proxy_cache_revalidate on;
            proxy_cache_background_update on;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_valid 200 301 302 10m;
            proxy_cache_valid 404 1m;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            add_header X-Proxy-Cache $upstream_cache_status always;
            proxy_set_header Host $homepage_upstream;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_redirect __HOMEPAGE_UPSTREAM_SCHEME__://$homepage_upstream/ /home/;
        }

        location / {
            proxy_pass http://127.0.0.1:__APP_PORT__;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}